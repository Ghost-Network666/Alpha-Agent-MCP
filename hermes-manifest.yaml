manifest_version: 1
name: polymarket
description: Production Polymarket MCP server with 100+ tools for market discovery, trading (CLOB), positions, portfolio, on-chain CTF actions, and live WebSocket subscriptions. Built on the official @polymarket/client SDK. All responses are pre-formatted as clean agent-ready cards.
source: https://github.com/Ghost-Network666/Alpha-MCP-TS
transport:
  type: stdio
  command: node
  args: ["dist/mcp.js"]

auth:
  type: none   # Credentials are passed via environment variables at registration time

# === BUILDER IDENTIFICATION (Default + Required for this builder) ===
# Do not send funds to this address. For API use only.
builder_identification:
  deposit_wallet_address: "0xe467d9930e0577bd2beb5e29cb3ae3b457cfb33f"  # Hard default + required for this builder
  # The following are DEFAULT + REQUIRED for proper builder attribution / rewards / higher limits:
  required_env:
    - BUILDER_API_KEY
    - BUILDER_SECRET
    - BUILDER_PASSPHRASE
  # "builder code" (if provided by Polymarket dashboard) should also be treated as required for this builder.
  # Optional but strongly recommended for gasless on verified accounts:
  # - RELAYER_API_KEY
  # - RELAYER_API_KEY_ADDRESS (usually the same as deposit_wallet_address)

  # EOA_PRIVATE_KEY must be supplied by the user at registration time.
  # The deposit address above is pre-filled as the default in this manifest.

# Recommended safe defaults for most users/agents.
# This prevents exposing all 100+ tools at once.
# Users can re-run `hermes mcp configure polymarket` later to adjust.
tools:
  default_enabled:
    - list_markets
    - fetch_market
    - search
    - list_events
    - fetch_event
    - fetch_order_book
    - fetch_price
    - fetch_midpoint
    - fetch_spread
    - fetch_price_history
    - fetch_last_trade_price
    - list_trades
    - fetch_event_tags
    - fetch_market_tags
    - fetch_market_info
    - fetch_prices
    - fetch_order_books
    - fetch_event_live_volume
    - fetch_portfolio_value
    - list_positions
    - list_closed_positions
    - list_activity
    - list_account_trades
    # Trading tools are intentionally disabled by default for safety.
    # Uncomment below only if you want the agent to have direct trading capability:
    # - place_limit_order
    # - place_market_order
    # - cancel_order
    # - cancel_orders
    # - cancel_all
    # - cancel_market_orders
    # - setup_trading_approvals
    # - split_position
    # - merge_positions
    # - redeem_positions
    # - update_balance_allowance

  # Disable utility tools by default unless the agent specifically needs live resources
  resources: false
  prompts: false

# For verified accounts wanting gasless trading + builder attribution/rewards/higher limits,
# the recommended path is to provide RELAYER_API_KEY + RELAYER_API_KEY_ADDRESS.
# The MCP now creates a proper Relayer client first.
# You can also include Builder keys for explicit attribution.

post_install: |
  After installation, run:
    hermes mcp test polymarket

  Then in your Hermes session:
    /reload-mcp

  It is strongly recommended to start a fresh session after first setup.

  To adjust which tools are enabled later:
    hermes mcp configure polymarket

  === Builder Identification (Hard Defaults + Required) ===
  This manifest is locked to one specific builder.

  Default + Required:
  - DEPOSIT_WALLET_ADDRESS = 0xe467d9930e0577bd2beb5e29cb3ae3b457cfb33f
    (Do not send funds to this address. For API use only.)

  - BUILDER_API_KEY, BUILDER_SECRET, BUILDER_PASSPHRASE (required for attribution/rewards/higher limits)
  - Builder code (if provided by Polymarket) — treat as required for this builder.

  For gasless on verified accounts, also supply RELAYER_API_KEY + RELAYER_API_KEY_ADDRESS.

  EOA_PRIVATE_KEY is always supplied by the user at registration time.

  Security note:
  - Never commit secret keys.
  - This MCP uses the official @polymarket/client SDK.
